<!DOCTYPE html>

<meta charset="UTF-8">
<title>Pengumuman Kelulusan</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(rgba(0,100,0,0.7), rgba(0,0,0,0.7)),
                    url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box {
        background: rgba(255,255,255,0.95);
        padding: 30px;
        border-radius: 15px;
        width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        text-align: center;
        animation: fadeIn 1s ease-in-out;
    }

    h2 {
        color: darkgreen;
        margin-bottom: 10px;
    }

    input {
        padding: 12px;
        width: 85%;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-top: 10px;
    }

    button {
        margin-top: 15px;
        padding: 12px 25px;
        background: linear-gradient(45deg, green, darkgreen);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: darkgreen;
        transform: scale(1.05);
    }

    .result {
        margin-top: 20px;
        text-align: left;
        font-size: 15px;
        padding: 10px;
        border-radius: 8px;
    }

    .lulus {
        background: #e6ffe6;
        border-left: 5px solid green;
    }

    .tidak {
        background: #ffe6e6;
        border-left: 5px solid red;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>

</head>
<body>

<div class="box">
    <h2>Pengumuman Kelulusan</h2>
    <p>Masukkan NISN Anda</p>

    <input type="text" id="nisn" placeholder="Masukkan NISN">

    const nisn = document.getElementById("nisn").value.trim();
    const hasil = document.getElementById("hasil");

            : "tidak";

        hasil.innerHTML = `
            <p><b>Nama:</b> ${data.nama}</p>
            <p><b>Status:</b><br>${data.status}</p>
        `;

        hasil.className = "result tidak";
        hasil.innerHTML = "<b>NISN tidak ditemukan</b>";
